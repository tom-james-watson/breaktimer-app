name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: release-windows
            artifact_glob: release/*.exe
            build_command: npx electron-builder build --win --x64 --publish never
          - os: macos-latest
            platform: macos
            artifact_name: release-macos
            artifact_glob: release/*.dmg
            build_command: npx electron-builder build --mac --universal --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app bundles
        run: npm run build

      - name: Validate Windows signing secrets
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WIN_CSC_LINK_BASE64: ${{ secrets.WIN_CSC_LINK_BASE64 }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if (-not $env:WIN_CSC_LINK_BASE64) { throw "Missing GitHub secret: WIN_CSC_LINK_BASE64" }
          if (-not $env:WIN_CSC_KEY_PASSWORD) { throw "Missing GitHub secret: WIN_CSC_KEY_PASSWORD" }

      - name: Prepare Windows signing certificate
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WIN_CSC_LINK_BASE64: ${{ secrets.WIN_CSC_LINK_BASE64 }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
          [System.IO.File]::WriteAllBytes(
            $pfxPath,
            [System.Convert]::FromBase64String($env:WIN_CSC_LINK_BASE64)
          )
          "WIN_CSC_LINK=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Validate macOS signing and notarization secrets
        if: matrix.platform == 'macos'
        shell: bash
        env:
          MAC_CSC_LINK_BASE64: ${{ secrets.MAC_CSC_LINK_BASE64 }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          MAC_APPLE_API_KEY_BASE64: ${{ secrets.MAC_APPLE_API_KEY_BASE64 }}
          MAC_APPLE_API_KEY_ID: ${{ secrets.MAC_APPLE_API_KEY_ID }}
          MAC_APPLE_API_ISSUER: ${{ secrets.MAC_APPLE_API_ISSUER }}
        run: |
          [ -n "$MAC_CSC_LINK_BASE64" ] || { echo "Missing GitHub secret: MAC_CSC_LINK_BASE64"; exit 1; }
          [ -n "$MAC_CSC_KEY_PASSWORD" ] || { echo "Missing GitHub secret: MAC_CSC_KEY_PASSWORD"; exit 1; }
          [ -n "$MAC_APPLE_API_KEY_BASE64" ] || { echo "Missing GitHub secret: MAC_APPLE_API_KEY_BASE64"; exit 1; }
          [ -n "$MAC_APPLE_API_KEY_ID" ] || { echo "Missing GitHub secret: MAC_APPLE_API_KEY_ID"; exit 1; }
          [ -n "$MAC_APPLE_API_ISSUER" ] || { echo "Missing GitHub secret: MAC_APPLE_API_ISSUER"; exit 1; }

      - name: Prepare macOS signing certificate and notary key
        if: matrix.platform == 'macos'
        shell: bash
        env:
          MAC_CSC_LINK_BASE64: ${{ secrets.MAC_CSC_LINK_BASE64 }}
          MAC_APPLE_API_KEY_BASE64: ${{ secrets.MAC_APPLE_API_KEY_BASE64 }}
          MAC_APPLE_API_KEY_ID: ${{ secrets.MAC_APPLE_API_KEY_ID }}
        run: |
          CERT_PATH="$RUNNER_TEMP/macos-signing.p12"
          echo "$MAC_CSC_LINK_BASE64" | base64 --decode > "$CERT_PATH"
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"

          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${MAC_APPLE_API_KEY_ID}.p8"
          echo "$MAC_APPLE_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build desktop package
        run: ${{ matrix.build_command }}
        env:
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'windows' && secrets.WIN_CSC_KEY_PASSWORD || secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.MAC_APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.MAC_APPLE_API_ISSUER }}
          CSC_IDENTITY_AUTO_DISCOVERY: "true"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish_release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
